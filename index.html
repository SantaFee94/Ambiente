<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LumaControl">
<meta name="theme-color" content="#050508">
<title>LumaControl</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:       #050508;
  --s1:       #0d0d14;
  --s2:       #13131e;
  --s3:       #191926;
  --border:   rgba(255,255,255,0.05);
  --c:        #00f5ff;
  --m:        #bf00ff;
  --g:        #00ff88;
  --o:        #ff6b00;
  --text:     #e8e8f0;
  --muted:    rgba(232,232,240,0.32);
  --T: env(safe-area-inset-top,0px);
  --B: env(safe-area-inset-bottom,0px);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:calc(var(--B) + 80px);
  user-select:none;
}

/* Header, Cards, etc. bleiben gleich – nur der neue Blinker-Bereich wird hinzugefügt */

.hdr { position:sticky;top:0;z-index:100; padding:calc(var(--T) + 14px) 18px 14px; display:flex;align-items:center;justify-content:space-between; background:rgba(5,5,8,0.85); backdrop-filter:blur(24px); border-bottom:1px solid rgba(0,245,255,0.1); }
.logo { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; letter-spacing:2px; color:var(--text); text-transform:uppercase; }
.logo span { color:var(--c); text-shadow:0 0 20px rgba(0,245,255,0.6); }

.ble-btn { display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:1px solid rgba(0,245,255,0.2); background:rgba(0,245,255,0.05); color:var(--muted); font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; text-transform:uppercase; }
.ble-btn.on { border-color:rgba(0,255,136,0.5); color:var(--g); background:rgba(0,255,136,0.08); }

.content { position:relative; z-index:1; padding:14px; display:flex; flex-direction:column; gap:12px; }
.page { display:none; flex-direction:column; gap:12px; }
.page.active { display:flex; }

.card { background:var(--s1); border:1px solid var(--border); border-radius:12px; padding:18px; display:flex; flex-direction:column; gap:16px; }
.card-label { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--c); opacity:0.6; }

/* Neue Blinker-Karte */
.blink-card { background:var(--s1); border:1px solid var(--border); border-radius:12px; padding:18px; }
.blink-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.blink-row label { font-size:13px; font-weight:600; }
.num-in { flex:1; padding:10px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Space Mono',monospace; font-size:16px; text-align:center; }

.toggle { width:56px; height:30px; border-radius:4px; background:var(--s3); border:1px solid var(--border); position:relative; cursor:pointer; }
.toggle.on { background:rgba(0,255,136,0.1); border-color:rgba(0,255,136,0.4); }
.toggle::after { content:''; position:absolute; top:4px; left:4px; width:20px; height:20px; border-radius:2px; background:rgba(232,232,240,0.3); transition:all .3s; }
.toggle.on::after { transform:translateX(26px); background:var(--g); }

/* Rest der Styles (unverändert) */
.power-row, .sl-wrap, .tabs, .palette, .eff-grid, .preset-list, .strip-item, .calc-box, .info-list, .btn-row, .nav { /* ... deine bisherigen Styles ... */ }
/* Ich lasse die restlichen Styles aus Platzgründen weg – sie bleiben 1:1 wie in deiner Originaldatei */

</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="logo">LUMA<span>CTRL</span></div>
  <button class="ble-btn" id="bleBtn" onclick="toggleBLE()">
    <div class="ble-dot"></div>
    <span id="bleText">Connect</span>
  </button>
</div>

<div class="content">

  <!-- STEUERN, EFFEKTE, PRESETS bleiben unverändert -->

  <!-- ══ SETUP ══ -->
  <div class="page" id="page-setup">

    <div class="card">
      <div class="card-label">LED Bänder</div>
      <div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;line-height:2;letter-spacing:.5px">
        BAND 1 → GPIO 4 &nbsp;·&nbsp; BAND 2 → GPIO 5<br>
        BAND 3 → GPIO 6 &nbsp;·&nbsp; BAND 4 → GPIO 7
      </div>
      <div id="stripList"></div>
      <button class="btn-save" onclick="saveStrips()">▶ Speichern & Übertragen</button>
      <div class="saved-hint" id="savedHint">✓ GESPEICHERT — ESP NEUSTART</div>
    </div>

    <!-- NEUE BLINKER KONFIGURATION -->
    <div class="card blink-card">
      <div class="card-label">Auto Blinker</div>
      
      <div class="blink-row">
        <label>Länge (ca. cm)</label>
        <input type="number" class="num-in" id="blinkLen" value="6" min="1" max="50" onchange="updateBlinkConfig()">
      </div>

      <div class="blink-row">
        <label>Band</label>
        <select id="blinkBand" onchange="updateBlinkConfig()" style="background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px;">
          <option value="0">Alle Bänder</option>
          <option value="1">Band 1</option>
          <option value="2">Band 2</option>
          <option value="3">Band 3</option>
          <option value="4">Band 4</option>
        </select>
      </div>

      <div class="blink-row">
        <label>Modus</label>
        <div class="toggle" id="blinkModeTog" onclick="toggleBlinkMode()"></div>
      </div>
      <div style="font-size:11px; color:var(--muted); margin-top:4px;" id="blinkModeTxt">Normaler Blinker</div>
    </div>

    <!-- Rest der Setup-Karte bleibt gleich -->
    <div class="card">
      <div class="card-label">Stromrechner</div>
      <div class="calc-box">
        <div class="calc-row"><span>Aktive Bänder</span><span id="calcS">—</span></div>
        <div class="calc-row"><span>LEDs gesamt</span><span id="calcL">—</span></div>
        <div class="calc-row"><span>Max. Strom</span><span id="calcP">—</span></div>
        <div class="calc-row"><span>Netzteil mind.</span><span id="calcN">—</span></div>
      </div>
    </div>

    <!-- ... Max. Helligkeit, System, Gerät ... bleiben unverändert ... -->

  </div>
</div>

<!-- Nav unverändert -->
<div class="nav">
  <div class="nav-btn active" onclick="goPage('ctrl',this)"><span class="ni">🎛</span>Steuern</div>
  <div class="nav-btn" onclick="goPage('eff',this)"><span class="ni">✨</span>Effekte</div>
  <div class="nav-btn" onclick="goPage('pre',this)"><span class="ni">⭐</span>Presets</div>
  <div class="nav-btn" onclick="goPage('setup',this)"><span class="ni">⚙</span>Setup</div>
</div>

<div class="toast" id="toast"></div>

<script>
// === DEIN ALTER CODE BLEIBT FAST IDENTISCH ===
// Nur die neuen Teile für Blinker werden hinzugefügt

// ... (alle deine bisherigen Variablen und Funktionen bleiben gleich: toggleBLE, send, S, togglePower, onBri, etc.)

// Neue Blinker-Funktionen
function updateBlinkConfig() {
  const length = parseInt(document.getElementById('blinkLen').value) || 6;
  const band = parseInt(document.getElementById('blinkBand').value);
  const mode = document.getElementById('blinkModeTog').classList.contains('on') ? 1 : 0;

  send(JSON.stringify({
    cmd: "blinkconfig",
    length: length,
    band: band,
    mode: mode
  }));
}

function toggleBlinkMode() {
  const tog = document.getElementById('blinkModeTog');
  tog.classList.toggle('on');
  document.getElementById('blinkModeTxt').textContent = 
    tog.classList.contains('on') ? "Lauflicht (modern)" : "Normaler Blinker";
  updateBlinkConfig();
}

// In saveStrips() am Ende hinzufügen (optional, da blinkconfig separat gesendet wird)
function saveStrips() {
  // ... dein alter Code ...
  updateBlinkConfig(); // Blinker-Konfig mit speichern
}

// Init am Ende hinzufügen
document.addEventListener('DOMContentLoaded', () => {
  // Lade gespeicherte Blinker-Werte (optional)
  document.getElementById('blinkLen').value = 6;
  document.getElementById('blinkBand').value = 0;
});

// Der Rest deiner Script-Funktionen (cTab, eTab, goPage, toast, hsv2rgb, etc.) bleibt unverändert
</script>
</body>
</html>
