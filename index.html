<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LumaControl">
<meta name="theme-color" content="#050508">
<title>LumaControl</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:       #050508;
  --s1:       #0d0d14;
  --s2:       #13131e;
  --s3:       #191926;
  --border:   rgba(255,255,255,0.05);
  --c:        #00f5ff;
  --m:        #bf00ff;
  --g:        #00ff88;
  --o:        #ff6b00;
  --text:     #e8e8f0;
  --muted:    rgba(232,232,240,0.32);
  --T: env(safe-area-inset-top,0px);
  --B: env(safe-area-inset-bottom,0px);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:calc(var(--B) + 80px);
  user-select:none;
}

/* Animated background & Scanline */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,245,255,0.06) 0%, transparent 60%),
              radial-gradient(ellipse 50% 40% at 80% 90%, rgba(191,0,255,0.07) 0%, transparent 60%),
              radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,255,136,0.03) 0%, transparent 60%);
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* Header */
.hdr {
  position:sticky; top:0; z-index:100;
  padding:calc(var(--T) + 14px) 18px 14px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(5,5,8,0.85); backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,245,255,0.1);
}
.logo {
  font-family:'Space Mono',monospace; font-size:18px; font-weight:700; letter-spacing:2px;
  color:var(--text); text-transform:uppercase;
}
.logo span { color:var(--c); text-shadow:0 0 20px rgba(0,245,255,0.6); }

.ble-btn {
  display:flex; align-items:center; gap:8px;
  padding:8px 16px; border-radius:6px;
  border:1px solid rgba(0,245,255,0.2); background:rgba(0,245,255,0.05);
  color:var(--muted); font-family:'Space Mono',monospace; font-size:10px;
  cursor:pointer; text-transform:uppercase;
}
.ble-btn.on {
  border-color:rgba(0,255,136,0.5); color:var(--g); background:rgba(0,255,136,0.08);
}

/* Content */
.content { position:relative; z-index:1; padding:14px; display:flex; flex-direction:column; gap:12px; }
.page { display:none; flex-direction:column; gap:12px; }
.page.active { display:flex; }

.card {
  background:var(--s1); border:1px solid var(--border); border-radius:12px;
  padding:18px; display:flex; flex-direction:column; gap:16px;
}
.card-label {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2.5px;
  text-transform:uppercase; color:var(--c); opacity:0.6;
}

  /* ═══ POWER ROW ═══ */
.power-row {
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-radius:12px;
  background:var(--s1);
  border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.power-row::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,255,136,0.5),transparent);
}
.power-text h2 { font-size:20px;font-weight:700;letter-spacing:-0.3px; }
.power-text p { font-size:11px;color:var(--muted);margin-top:3px;font-family:'Space Mono',monospace; }

.toggle {
  width:56px;height:30px;border-radius:4px;
  background:var(--s3);border:1px solid var(--border);
  position:relative;cursor:pointer;transition:all .3s;flex-shrink:0;
}
.toggle.on {
  background:rgba(0,255,136,0.1);
  border-color:rgba(0,255,136,0.4);
  box-shadow:0 0 16px rgba(0,255,136,0.15);
}
.toggle::after {
  content:'';position:absolute;top:4px;left:4px;
  width:20px;height:20px;border-radius:2px;
  background:rgba(232,232,240,0.3);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.toggle.on::after { transform:translateX(26px);background:var(--g);box-shadow:0 0 10px var(--g); }

/* ═══ SLIDERS ═══ */
.sl-wrap { display:flex;flex-direction:column;gap:9px; }
.sl-hdr { display:flex;justify-content:space-between;align-items:center; }
.sl-lbl { font-size:13px;font-weight:600; }
.sl-val { font-family:'Space Mono',monospace;font-size:12px;color:var(--c); }

input[type=range] { -webkit-appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer; }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;width:22px;height:22px;border-radius:4px;
  background:var(--s1);border:2px solid var(--c);
  box-shadow:0 0 10px rgba(0,245,255,0.5);
  cursor:pointer;transition:transform .1s;
}
input[type=range]::-webkit-slider-thumb:active { transform:scale(1.2); }

#hue-sl  { background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00); }
#bri-sl  { background:linear-gradient(to right,#0d0d14,var(--text)); }
#spd-sl  { background:linear-gradient(to right,#0d0d14,var(--c)); }
#r-sl    { background:linear-gradient(to right,#0d0d14,#ff3366); }
#g-sl    { background:linear-gradient(to right,#0d0d14,#00ff88); }
#b-sl    { background:linear-gradient(to right,#0d0d14,#00f5ff); }

/* ═══ COLOR PREVIEW ═══ */
.color-prev {
  height:64px;border-radius:8px;
  border:1px solid var(--border);
  transition:background .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.color-prev::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 40%,rgba(0,0,0,0.2) 100%);
}

/* ═══ TABS ═══ */
.tabs {
  display:flex;background:var(--s3);padding:3px;border-radius:8px;
  border:1px solid var(--border);gap:3px;
}
.tab {
  flex:1;padding:8px;text-align:center;font-size:11px;font-weight:600;
  border-radius:6px;cursor:pointer;color:var(--muted);transition:all .2s;
  letter-spacing:.5px;text-transform:uppercase;font-family:'Space Mono',monospace;
}
.tab.active {
  background:var(--s1);color:var(--c);
  border:1px solid rgba(0,245,255,0.2);
  text-shadow:0 0 10px var(--c);
}
.tab-pane { display:none;flex-direction:column;gap:14px; }
.tab-pane.active { display:flex; }

/* ═══ PALETTE ═══ */
.palette { display:grid;grid-template-columns:repeat(6,1fr);gap:8px; }
.swatch {
  aspect-ratio:1;border-radius:6px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  transition:all .15s;
}
.swatch:active { transform:scale(.8);box-shadow:0 0 14px currentColor; }

/* ═══ EFFECTS ═══ */
.eff-tabs { display:flex;background:var(--s3);padding:3px;border-radius:8px;border:1px solid var(--border);gap:3px; }
.eff-tab {
  flex:1;padding:8px;text-align:center;font-size:11px;font-weight:600;
  border-radius:6px;cursor:pointer;color:var(--muted);transition:all .2s;
  letter-spacing:.5px;text-transform:uppercase;font-family:'Space Mono',monospace;
}
.eff-tab.active { background:var(--s1);color:var(--m);border:1px solid rgba(191,0,255,0.2);text-shadow:0 0 10px var(--m); }
.eff-pane { display:none;flex-direction:column;gap:12px; }
.eff-pane.active { display:flex; }

.eff-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:7px; }
.eff-btn {
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;background:var(--s2);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;
  text-align:center;padding:6px 3px;transition:all .2s;
  letter-spacing:.3px;text-transform:uppercase;font-family:'Space Mono',monospace;
}
.eff-btn .ico { font-size:20px;line-height:1; }
.eff-btn.active {
  border-color:rgba(0,245,255,0.5);color:var(--c);
  background:rgba(0,245,255,0.06);
  box-shadow:0 0 16px rgba(0,245,255,0.15), inset 0 0 16px rgba(0,245,255,0.04);
  text-shadow:0 0 8px var(--c);
}

/* ═══ PRESETS ═══ */
.preset-list { display:flex;flex-direction:column;gap:8px; }
.preset-item {
  display:flex;align-items:center;gap:14px;
  padding:13px 16px;background:var(--s2);
  border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .2s;
}
.preset-item:active { transform:scale(.98);border-color:rgba(0,245,255,0.2); }
.preset-dot { width:38px;height:38px;border-radius:8px;flex-shrink:0; }
.preset-name { font-size:14px;font-weight:700; }
.preset-sub  { font-size:10px;color:var(--muted);margin-top:2px;font-family:'Space Mono',monospace; }
.preset-arrow { color:var(--muted);font-size:18px;margin-left:auto; }

/* ═══ SETUP STRIPS ═══ */
.strip-item {
  background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:14px;margin-bottom:10px;transition:all .2s;
}
.strip-item:last-child { margin-bottom:0; }
.strip-item.active {
  border-color:rgba(0,245,255,0.25);
  box-shadow:0 0 20px rgba(0,245,255,0.05);
}

.strip-hdr { display:flex;align-items:center;gap:10px;margin-bottom:13px; }
.strip-num {
  width:30px;height:30px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:13px;font-weight:700;
  background:var(--s3);border:1px solid rgba(0,245,255,0.3);
  color:var(--c);box-shadow:0 0 10px rgba(0,245,255,0.15);
}
.strip-name { font-size:14px;font-weight:700;flex:1; }
.strip-gpio { font-size:10px;color:var(--c);font-family:'Space Mono',monospace;margin-top:1px;opacity:.7; }

.strip-tog {
  width:46px;height:26px;border-radius:4px;
  background:var(--s3);border:1px solid var(--border);
  position:relative;cursor:pointer;transition:all .3s;flex-shrink:0;
}
.strip-tog.on {
  background:rgba(0,245,255,0.08);
  border-color:rgba(0,245,255,0.4);
  box-shadow:0 0 12px rgba(0,245,255,0.1);
}
.strip-tog::after {
  content:'';position:absolute;top:3px;left:3px;
  width:18px;height:18px;border-radius:3px;
  background:rgba(232,232,240,0.25);
  transition:all .28s cubic-bezier(.34,1.56,.64,1);
}
.strip-tog.on::after { transform:translateX(20px);background:var(--c);box-shadow:0 0 8px var(--c); }

.led-lbl { font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px; }
.led-row { display:flex;align-items:center;gap:6px; }
.num-in {
  flex:1;padding:10px;background:var(--bg);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:'Space Mono',monospace;
  font-size:16px;font-weight:700;text-align:center;outline:none;min-width:0;
  transition:border-color .2s,box-shadow .2s;
}
.num-in:focus { border-color:rgba(0,245,255,0.4);box-shadow:0 0 12px rgba(0,245,255,0.1); }
.num-btn {
  width:38px;height:38px;border-radius:8px;border:1px solid var(--border);
  background:var(--s2);color:var(--text);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.num-btn:active { background:var(--c);border-color:var(--c);color:var(--bg);box-shadow:0 0 12px var(--c); }

/* ═══ CALC ═══ */
.calc-box {
  background:var(--s3);border:1px solid var(--border);
  border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;
}
.calc-row { display:flex;justify-content:space-between;font-size:12px; }
.calc-row span:first-child { color:var(--muted); }
.calc-row span:last-child { font-family:'Space Mono',monospace;color:var(--c); }

/* ═══ SAVE BTN ═══ */
.btn-save {
  width:100%;padding:15px;border-radius:8px;
  background:linear-gradient(135deg,rgba(0,245,255,0.1),rgba(191,0,255,0.1));
  border:1px solid rgba(0,245,255,0.3);
  color:var(--c);font-family:'Space Grotesk',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
  text-shadow:0 0 10px var(--c);
}
.btn-save:active { transform:scale(.98);box-shadow:0 0 20px rgba(0,245,255,0.2); }

.saved-hint {
  display:none;text-align:center;padding:10px;
  font-size:11px;color:var(--g);
  font-family:'Space Mono',monospace;letter-spacing:1px;
  background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);
  border-radius:8px;text-shadow:0 0 8px var(--g);
}
.saved-hint.show { display:block; }

/* ═══ INFO ═══ */
.info-list { display:flex;flex-direction:column; }
.info-row { display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border); }
.info-row:last-child { border-bottom:none; }
.info-k { font-size:12px;color:var(--muted); }
.info-v { font-family:'Space Mono',monospace;font-size:12px;color:var(--c); }

/* ═══ DANGER ═══ */
.btn-row { display:flex;gap:8px; }
.btn-d {
  flex:1;padding:13px 8px;border-radius:8px;
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  letter-spacing:.5px;text-transform:uppercase;
}
.btn-d:active { transform:scale(.95); }
.btn-restart { background:rgba(255,107,0,0.07);border:1px solid rgba(255,107,0,0.25);color:var(--o); }
.btn-off     { background:rgba(255,50,100,0.07);border:1px solid rgba(255,50,100,0.25);color:#ff3366; }
.btn-wide    { width:100%;flex-direction:row;gap:8px;padding:11px 14px;margin-top:7px;font-size:11px; }
.btn-rapp    { background:rgba(255,50,100,0.05);border:1px solid rgba(255,50,100,0.15);color:rgba(255,51,102,.5); }
.btn-resp    { background:rgba(255,50,100,0.03);border:1px solid rgba(255,50,100,0.1); color:rgba(255,51,102,.3);margin-top:5px; }

/* ═══ INSTALL BANNER ═══ */
.install-banner {
  display:none;align-items:center;gap:12px;padding:13px 16px;
  background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.15);border-radius:10px;
}
.install-banner.show { display:flex; }

/* ═══ NAV ═══ */
.nav {
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;padding:10px 8px calc(var(--B) + 10px);
  background:rgba(5,5,8,0.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(0,245,255,0.08);
}
.nav-btn {
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;color:var(--muted);
  font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  font-family:'Space Mono',monospace;padding:5px 0;transition:all .2s;
}
.nav-btn .ni { font-size:20px; }
.nav-btn.active { color:var(--c); }
.nav-btn.active .ni { filter:drop-shadow(0 0 8px var(--c)); }

/* ═══ TOAST ═══ */
.toast {
  position:fixed;bottom:calc(var(--B) + 90px);left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--s2);border:1px solid rgba(0,245,255,0.25);
  color:var(--text);padding:10px 20px;border-radius:8px;
  font-size:11px;font-family:'Space Mono',monospace;letter-spacing:.5px;
  opacity:0;transition:all .3s;z-index:200;white-space:nowrap;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px rgba(0,245,255,0.1);
}
.toast.show { opacity:1;transform:translateX(-50%) translateY(0); }


/* Blinker Card */
.blink-card {
  background:var(--s1); border:1px solid var(--border); border-radius:12px; padding:18px;
}
.blink-row {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
}
.blink-row label { font-size:13px; font-weight:600; }
.num-in {
  flex:1; padding:10px; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'Space Mono',monospace;
  font-size:16px; text-align:center;
}
.toggle {
  width:56px; height:30px; border-radius:4px; background:var(--s3);
  border:1px solid var(--border); position:relative; cursor:pointer;
}
.toggle.on { background:rgba(0,255,136,0.1); border-color:rgba(0,255,136,0.4); }
.toggle::after {
  content:''; position:absolute; top:4px; left:4px; width:20px; height:20px;
  border-radius:2px; background:rgba(232,232,240,0.3); transition:all .3s;
}
.toggle.on::after { transform:translateX(26px); background:var(--g); }

/* Restliche Styles (Power, Slider, Tabs, Effects, Presets, etc.) bleiben gleich wie in deiner Originaldatei */
.power-row, .sl-wrap, .tabs, .palette, .eff-grid, .preset-list, .strip-item, .calc-box, .info-list, .btn-row, .nav {
  /* Deine Original-Styles hier einfügen – sie bleiben unverändert */
}

/* Für diese Antwort habe ich sie aus Platzgründen weggelassen. 
   Kopiere einfach alle Styles aus deiner Original-HTML-Datei hierher (alles zwischen <style> und </style>). */

</style>

<!-- Header -->
<div class="hdr">
  <div class="logo">LUMA<span>CTRL</span></div>
  <button class="ble-btn" id="bleBtn" onclick="toggleBLE()">
    <div class="ble-dot"></div>
    <span id="bleText">Connect</span>
  </button>
</div>

<div class="content">

  <!-- STEUERN, EFFEKTE, PRESETS bleiben 1:1 wie bei dir -->

  <!-- ══ SETUP ══ -->
  <div class="page" id="page-setup">

    <div class="card">
      <div class="card-label">LED Bänder</div>
      <div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;line-height:2;letter-spacing:.5px">
        BAND 1 → GPIO 4 &nbsp;·&nbsp; BAND 2 → GPIO 5<br>
        BAND 3 → GPIO 6 &nbsp;·&nbsp; BAND 4 → GPIO 7
      </div>
      <div id="stripList"></div>
      <button class="btn-save" onclick="saveStrips()">▶ Speichern & Übertragen</button>
      <div class="saved-hint" id="savedHint">✓ GESPEICHERT — ESP NEUSTART</div>
    </div>

    <!-- NEUE BLINKER KONFIGURATION -->
    <div class="card blink-card">
      <div class="card-label">Auto Blinker Einstellungen</div>
      
      <div class="blink-row">
        <label>Blink-Länge (LEDs)</label>
        <input type="number" id="blinkLen" class="num-in" value="6" min="1" max="60" onchange="updateBlinkConfig()">
      </div>

      <div class="blink-row">
        <label>Band</label>
        <select id="blinkBand" onchange="updateBlinkConfig()" style="background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px; flex:1;">
          <option value="0">Alle Bänder</option>
          <option value="1">Band 1</option>
          <option value="2">Band 2</option>
          <option value="3">Band 3</option>
          <option value="4">Band 4</option>
        </select>
      </div>

      <div class="blink-row">
        <label>Modus</label>
        <div class="toggle" id="blinkModeTog" onclick="toggleBlinkMode()"></div>
      </div>
      <div style="font-size:11px; color:var(--muted);" id="blinkModeTxt">Normaler Blinker</div>
    </div>

    <!-- Stromrechner, Max. Helligkeit, System, Gerät bleiben unverändert -->
    <div class="card">
      <div class="card-label">Stromrechner</div>
      <div class="calc-box">
        <div class="calc-row"><span>Aktive Bänder</span><span id="calcS">—</span></div>
        <div class="calc-row"><span>LEDs gesamt</span><span id="calcL">—</span></div>
        <div class="calc-row"><span>Max. Strom</span><span id="calcP">—</span></div>
        <div class="calc-row"><span>Netzteil mind.</span><span id="calcN">—</span></div>
      </div>
    </div>

    <!-- ... deine restlichen Setup-Karten (Max Helligkeit, System, Gerät) ... -->

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === DEIN ORIGINALER JAVASCRIPT CODE BLEIBT FAST IDENTISCH ===
// Nur die Blinker-Teile wurden hinzugefügt

// ... (alle deine bisherigen Funktionen: toggleBLE, send, S, togglePower, onBri, onHSV, onRGB, pal, selEff, applyPre, buildStrips, saveStrips, etc.)

// Neue Blinker-Funktionen
function updateBlinkConfig() {
  const length = parseInt(document.getElementById('blinkLen').value) || 6;
  const band = parseInt(document.getElementById('blinkBand').value);
  const mode = document.getElementById('blinkModeTog').classList.contains('on') ? 1 : 0;

  send(JSON.stringify({
    cmd: "blinkconfig",
    length: length,
    band: band,
    mode: mode
  }));
}

function toggleBlinkMode() {
  const tog = document.getElementById('blinkModeTog');
  tog.classList.toggle('on');
  document.getElementById('blinkModeTxt').textContent = 
    tog.classList.contains('on') ? "Lauflicht (modern)" : "Normaler Blinker";
  updateBlinkConfig();
}

// In saveStrips() am Ende hinzufügen
function saveStrips() {
  // Dein alter Code ...
  cfg.strips.forEach((_,i)=>{
    const el=document.getElementById('li'+i);
    if(el) cfg.strips[i].leds=parseInt(el.value)||0;
  });
  cfg.maxBri=parseInt(document.getElementById('maxbri-sl').value);
  localStorage.setItem('strips',JSON.stringify(cfg.strips));
  localStorage.setItem('maxBri',cfg.maxBri);

  const j = '[' + cfg.strips.map((s,i) => `{"id":${i},"leds":${s.leds},"on":${s.on}}`).join(',') + ']';
  send(`{"cmd":"strips","strips":${j},"maxBri":${cfg.maxBri}}`);

  document.getElementById('savedHint').classList.add('show');
  setTimeout(() => document.getElementById('savedHint').classList.remove('show'), 5000);

  updateBlinkConfig();   // Blinker-Konfig mit speichern

  if(connected){ autoRC=true; toast('Gesendet — ESP Neustart…'); setTimeout(()=>setConn(false),1500); }
  else toast('✓ Lokal gespeichert');
}

// Init
updatePreview(); 
onHSV();
document.getElementById('maxbri-sl').value = cfg.maxBri;
document.getElementById('maxBriVal').textContent = Math.round(cfg.maxBri/2.55)+'%';
buildStrips();

// Blinker-Initialisierung
document.getElementById('blinkLen').value = 6;
document.getElementById('blinkBand').value = 0;
</script>
</body>
