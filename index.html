<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LumaControl">
<meta name="theme-color" content="#050508">
<title>LumaControl</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:    #050508;
  --s1:    #0d0d14;
  --s2:    #13131e;
  --s3:    #191926;
  --b:     rgba(255,255,255,0.05);
  --c:     #00f5ff;
  --g:     #00ff88;
  --warn:  #ffcc00;
  --text:  #e8e8f0;
  --muted: rgba(232,232,240,0.32);
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  padding-bottom:90px;
  overflow-x:hidden;
}

.hdr {
  position:sticky; top:0; z-index:100;
  padding:20px 18px 14px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(5,5,8,0.95); backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,245,255,0.1);
}
.logo { font-family:'Space Mono',monospace; font-size:19px; font-weight:700; letter-spacing:2px; }
.logo span { color:var(--c); }

.ble-btn {
  display:flex; align-items:center; gap:8px;
  padding:9px 18px; border-radius:8px;
  border:1px solid rgba(0,245,255,0.3);
  background:rgba(0,245,255,0.08);
  color:var(--muted); font-size:11px; font-family:'Space Mono',monospace;
  cursor:pointer; transition:all .3s;
}
.ble-btn.on { border-color:var(--g); color:var(--g); background:rgba(0,255,136,0.1); }
.ble-dot { width:7px; height:7px; border-radius:50%; background:currentColor; animation:blink 2s infinite; }
@keyframes blink { 50% { opacity:0.3; } }

/* Rest der Styles (vereinfacht) */
.content { padding:16px; display:flex; flex-direction:column; gap:14px; }
.card { background:var(--s1); border:1px solid var(--b); border-radius:14px; padding:18px; }
.lbl { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--c); margin-bottom:8px; text-transform:uppercase; }

.eff-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.eff-btn {
  aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--s2); border:1px solid var(--b); border-radius:12px; cursor:pointer; font-size:10px;
  transition:all .2s;
}
.eff-btn.active { border-color:var(--c); color:var(--c); background:rgba(0,245,255,0.1); }

.btn-save {
  width:100%; padding:16px; margin-top:10px; border-radius:10px;
  background:linear-gradient(135deg,#00f5ff,#bf00ff);
  color:#000; font-weight:700; font-size:14px; cursor:pointer;
}
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  background:#1a1a24; color:#fff; padding:12px 24px; border-radius:8px;
  font-family:'Space Mono',monospace; font-size:13px; opacity:0; transition:all .3s;
  z-index:999;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(-10px); }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">LUMA<span>CTRL</span></div>
  <button class="ble-btn" id="bleBtn" onclick="toggleBLE()">
    <div class="ble-dot"></div>
    <span id="bleText">CONNECT</span>
  </button>
</div>

<div class="content">

  <!-- Steuern -->
  <div class="card">
    <div class="lbl">Power</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <h2 id="powerStatus">LEDs AUS</h2>
      </div>
      <div onclick="togglePower()" style="width:60px;height:34px;background:#222;border-radius:20px;position:relative;cursor:pointer" id="powerToggle">
        <div id="powerKnob" style="position:absolute;top:3px;left:3px;width:28px;height:28px;background:#555;border-radius:50%;transition:all 0.3s"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="lbl">Helligkeit</div>
    <input type="range" id="bri" min="10" max="255" value="160" style="width:100%" oninput="sendBri(this.value)">
  </div>

  <div class="card">
    <div class="lbl">Effekt</div>
    <div class="eff-grid">
      <div class="eff-btn active" data-id="0" onclick="selEff(0)">Solid</div>
      <div class="eff-btn" data-id="1" onclick="selEff(1)">Rainbow</div>
      <div class="eff-btn" data-id="2" onclick="selEff(2)">Police</div>
      <div class="eff-btn" data-id="3" onclick="selEff(3)">Knight</div>
      <div class="eff-btn" data-id="4" onclick="selEff(4)">Fireworks</div>
      <div class="eff-btn" data-id="5" onclick="selEff(5)">Heartbeat</div>
      <div class="eff-btn" data-id="6" onclick="selEff(6)">Chase</div>
      <div class="eff-btn" data-id="7" onclick="selEff(7)">Meteor</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ================== BLE Verbindung ==================
let device = null;
let writeCharacteristic = null;
let isConnected = false;

const SERVICE_UUID = "12345678-1234-1234-1234-123456789abc";
const CTRL_UUID    = "12345678-1234-1234-1234-123456789001";

async function toggleBLE() {
  const btn = document.getElementById('bleBtn');
  const txt = document.getElementById('bleText');

  if (isConnected) {
    if (device) device.gatt.disconnect();
    return;
  }

  try {
    txt.textContent = "Suche...";
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    writeCharacteristic = await service.getCharacteristic(CTRL_UUID);

    isConnected = true;
    btn.classList.add('on');
    txt.textContent = "VERBUNDEN";

    toast("✅ Erfolgreich verbunden mit LumaControl");

  } catch (err) {
    txt.textContent = "CONNECT";
    toast("❌ Verbindung fehlgeschlagen");
    console.error(err);
  }
}

// ================== Senden ==================
function send(obj) {
  if (!writeCharacteristic || !isConnected) {
    toast("❌ Nicht verbunden");
    return;
  }
  const str = JSON.stringify(obj);
  writeCharacteristic.writeValueWithoutResponse(new TextEncoder().encode(str));
}

// ================== Einfache Steuerung ==================
function togglePower() {
  send({ cmd: "power", val: 1 });   // Toggle wird später erweitert
  toast("Power-Befehl gesendet");
}

function sendBri(val) {
  send({ cmd: "bri", val: parseInt(val) });
}

function selEff(id) {
  send({ cmd: "effect", id: parseInt(id) });
  document.querySelectorAll('.eff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.eff-btn[data-id="${id}"]`).classList.add('active');
}

// Toast
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
window.onload = () => {
  toast("LumaControl Web-App geladen");
};
</script>
</body>
</html>
